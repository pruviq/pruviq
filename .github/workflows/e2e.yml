name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Install test dependencies
      run: npm install -D @playwright/test axe-core

    - name: Install Chromium
      run: npx playwright install --with-deps chromium

    - name: Check i18n key completeness
      run: npx tsx scripts/check-i18n-keys.ts

    - name: Build site
      run: npm run build

    # Root cause fix: verify production API is reachable before running API-dependent tests.
    # Distinguishes "API down" (infrastructure) from "test logic flaky" (code bug).
    - name: Check API health
      run: |
        echo "Checking api.pruviq.com reachability..."
        for i in {1..6}; do
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://api.pruviq.com/health --max-time 10 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API healthy (attempt $i)"
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
          sleep 10
        done
        echo "::warning::API unreachable after 60s — API-dependent tests will skip via skipInCI"

    - name: Run E2E tests
      id: e2e
      run: |
        npx playwright test tests/e2e/ \
          --timeout 90000 \
          --workers 1 \
          --retries 2
      # timeout 90s/test (was 30s — prevents false fails from slow GitHub→DO API latency)
      # workers 1 — prevents race conditions on single preview server port
      # retries 2 — absorbs transient network hiccups and Preact hydration timing jitter
      timeout-minutes: 32
      env:
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload visual snapshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshots-${{ github.event.pull_request.number || github.run_id }}
        path: playwright-report/screenshots/
        retention-days: 30
        if-no-files-found: ignore

    - name: Post failure feedback to PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const prNumber = context.payload.pull_request.number;
          const branch = context.payload.pull_request.head.ref;
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

          // Check retry count from existing comments
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });
          const botFailComments = comments.data.filter(c =>
            c.body && c.body.includes('[E2E-AUTOFIX]')
          );
          const retryCount = botFailComments.length + 1;

          // Note: auto-close disabled — retryCount tracked for info only
          const body = `[E2E-AUTOFIX] Attempt #${retryCount} — E2E tests failed.\n\nBranch: \`${branch}\`\nRun: ${runUrl}\n\nCheck the [workflow log](${runUrl}) for details.`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body,
          });

    - name: Notify failure via Telegram
      if: failure() && github.event_name == 'pull_request'
      env:
        TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
      run: |
        [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
        PR_NUM="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"
        BRANCH="${{ github.event.pull_request.head.ref }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG="E2E FAIL: PR #${PR_NUM} (${BRANCH})
        ${PR_TITLE}
        Log: ${RUN_URL}
        OpenClaw autofix will retry within 1 hour."
        curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" -d text="${MSG}" || true

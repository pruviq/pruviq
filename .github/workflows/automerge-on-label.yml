name: Auto-merge labeled PRs

on:
  pull_request:
    types: [labeled]
  workflow_run:
    workflows: ["validate-startup-files"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  attempt-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt auto-merge if labeled and checks pass
        uses: actions/github-script@v6
        with:
          script: |
            const labelName = 'automerge';
            const restrictedPrefixes = ['backend/'];

            let pr = null;
            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else if (context.eventName === 'workflow_run') {
              const headSha = context.payload.workflow_run.head_sha;
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: headSha,
              });
              if (!prs.data || prs.data.length === 0) {
                core.info(`No PRs associated with commit ${headSha}`);
                return;
              }
              pr = prs.data[0];
            } else {
              core.info(`Unsupported event: ${context.eventName}`);
              return;
            }

            const prNumber = pr.number;
            core.info(`Found PR #${prNumber}`);

            // Ensure the PR still has the automerge label
            const labels = pr.labels ? pr.labels.map(l => l.name) : [];
            if (!labels.includes(labelName)) {
              core.info(`PR #${prNumber} does not have label ${labelName}; aborting.`);
              return;
            }

            // Check changed files for restricted paths
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            for (const f of files) {
              for (const prefix of restrictedPrefixes) {
                if (f.filename.startsWith(prefix)) {
                  core.setFailed(`PR touches restricted path: ${f.filename}`);
                  return;
                }
              }
            }

            // Check combined status for head SHA
            const headSha = pr.head && pr.head.sha ? pr.head.sha : null;
            if (!headSha) {
              core.info('No head SHA found for PR; aborting.');
              return;
            }

            const status = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });
            core.info(`Combined status for ${headSha}: ${status.data.state}`);

            if (status.data.state !== 'success') {
              core.info('Checks not green yet; will not merge.');
              return;
            }

            // All checks green — attempt to merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'merge',
              });
              core.info(`Merged PR #${prNumber}`);
            } catch (err) {
              core.setFailed(`Failed to merge PR #${prNumber}: ${err.message}`);
            }

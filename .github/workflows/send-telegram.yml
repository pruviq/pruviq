name: Send Telegram Message
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send'
        required: true
        type: string

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram
        env:
          TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
          MSG: ${{ inputs.message }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MSG}" && echo "Sent!"

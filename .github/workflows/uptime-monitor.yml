name: Uptime Monitor

on:
  schedule:
    # every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check endpoints
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          endpoints=("https://api.pruviq.com/market" "https://api.pruviq.com/coins/stats" "https://pruviq.com")
          for url in "${endpoints[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$status" -ge 500 ] 2>/dev/null; then
              timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              body="Uptime monitor detected HTTP ${status} for ${url} at ${timestamp}\n\nThis issue was created automatically by the uptime-monitor workflow.\n\nPlease attach Cloudflare/origin logs and recent deploy IDs for further analysis."
              title="Uptime alert: ${url} returning ${status}"
              echo "Creating issue: $title"
              # Create GitHub issue via REST API
              curl -s -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${REPO}/issues \
                -d "$(printf '{"title":"%s","body":"%s","labels":["uptime-monitor","bot"]}' "$title" "$body")"
            fi
          done

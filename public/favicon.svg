<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>PRUVIQ</title>
  <defs>
    <linearGradient id="blk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5cff9f"/>
      <stop offset="30%" stop-color="#33ff88"/>
      <stop offset="70%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00b85c"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Green IQ block only - no background -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="url(#blk)"/>
  <rect x="1" y="1" width="30" height="15" rx="6" fill="url(#sh)"/>
  <text x="16" y="22" font-family="'JetBrains Mono','SF Mono','Menlo',monospace" font-size="15" font-weight="800" fill="#0a0e27" text-anchor="middle" letter-spacing="0.3">IQ</text>
  <!-- Checkmark badge -->
  <circle cx="27" cy="5" r="4.5" fill="#2a2f4e"/>
  <circle cx="27" cy="5" r="3" fill="#00E676"/>
  <polyline points="25.2,5 26.4,6.2 29,3.8" fill="none" stroke="#0a0e27" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

name: weekly-agent-research-free

on:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC
  workflow_dispatch: {}

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run research PoC (free mode)
        env:
          TZ: 'Asia/Seoul'
        run: |
          mkdir -p reports
          python3 scripts/research_agent.py --out reports/agent-research-$(date +%F).md
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-research
          path: reports/agent-research-*.md

name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Install test dependencies
      run: npm install -D @playwright/test axe-core

    - name: Install Chromium
      run: npx playwright install --with-deps chromium

    - name: Build site
      run: npm run build

    - name: Run E2E tests
      id: e2e
      run: npx playwright test tests/e2e/
      env:
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Post failure feedback to PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const prNumber = context.payload.pull_request.number;
          const branch = context.payload.pull_request.head.ref;
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

          // Check retry count from existing comments
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });
          const botFailComments = comments.data.filter(c =>
            c.body && c.body.includes('[E2E-AUTOFIX]')
          );
          const retryCount = botFailComments.length + 1;

          let body;
          if (retryCount > 3) {
            body = `[E2E-AUTOFIX] Retry #${retryCount} — **closing PR** (exceeded 3 retries).\n\nBranch: \`${branch}\`\nRun: ${runUrl}\n\nThis PR has failed E2E tests ${retryCount} times. Closing to prevent infinite loops. A new issue may be opened for manual investigation.`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed',
            });
          } else {
            body = `[E2E-AUTOFIX] Retry #${retryCount}/3 — E2E tests failed.\n\nBranch: \`${branch}\`\nRun: ${runUrl}\n\nOpenClaw autofix will pick this up on the next scheduled run. Check the [workflow log](${runUrl}) for details.`;
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body,
          });

    - name: Notify failure via Telegram
      if: failure() && github.event_name == 'pull_request'
      env:
        TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
      run: |
        [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
        PR_NUM="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"
        BRANCH="${{ github.event.pull_request.head.ref }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        MSG="E2E FAIL: PR #${PR_NUM} (${BRANCH})
        ${PR_TITLE}
        Log: ${RUN_URL}
        OpenClaw autofix will retry within 1 hour."
        curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" -d text="${MSG}" || true

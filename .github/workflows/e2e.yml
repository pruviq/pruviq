name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e:
    name: Playwright E2E
    # Self-hosted Mac Mini M4 runner — CI = 로컬 환경 완전 일치.
    # 실패 = 로컬에서 100% 재현 가능 → JEPO e2e-autofix 에이전트가 정확하게 수정.
    runs-on: [self-hosted, macOS, arm64]
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Use Node 22
      run: |
        node --version
        npm --version

    - name: Install dependencies
      run: npm ci

    - name: Install Chromium
      run: npx playwright install chromium

    - name: Check i18n key completeness
      run: npx tsx scripts/check-i18n-keys.ts

    - name: Build site
      run: npm run build

    - name: Check API health
      run: |
        echo "Checking api.pruviq.com reachability..."
        for i in {1..6}; do
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://api.pruviq.com/health --max-time 10 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API healthy (attempt $i)"
            exit 0
          fi
          echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
          sleep 10
        done
        echo "::warning::API unreachable after 60s — API-dependent tests will skip"

    - name: Run E2E tests
      id: e2e
      run: |
        npx playwright test tests/e2e/ \
          --timeout 60000 \
          --workers 2 \
          --retries 1
      # Self-hosted M4: timeout 60s (이전 90s는 GitHub→DO 레이턴시 보정용, 불필요)
      # workers 2 (M4 Pro 성능 활용)
      # retries 1 (진짜 flaky는 self-hosted에서도 재현됨, 1회로 충분)
      timeout-minutes: 15
      env:
        CI: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload visual snapshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-snapshots-${{ github.event.pull_request.number || github.run_id }}
        path: playwright-report/screenshots/
        retention-days: 1
        if-no-files-found: ignore

    - name: Extract failing test names
      if: failure() && github.event_name == 'pull_request'
      id: failing_tests
      run: |
        FAILING=""
        if [ -f playwright-report/results.json ]; then
          FAILING=$(node -e "
            const r = require('./playwright-report/results.json');
            const fails = [];
            (r.suites || []).forEach(s => {
              (s.specs || []).forEach(sp => {
                if (sp.tests && sp.tests.some(t => t.status !== 'expected')) {
                  fails.push((s.title ? s.title + ' > ' : '') + sp.title);
                }
              });
            });
            console.log(fails.slice(0, 20).join('\n'));
          " 2>/dev/null || echo "(could not parse results)")
        fi
        echo "FAILING_TESTS<<EOF" >> "$GITHUB_OUTPUT"
        echo "$FAILING" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create or update e2e-fix issue
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        FAILING_TESTS: ${{ steps.failing_tests.outputs.FAILING_TESTS }}
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const branch = context.payload.pull_request.head.ref;
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const failingTests = process.env.FAILING_TESTS || '(see CI log)';
          const prTitle = context.payload.pull_request.title;

          for (const label of [
            { name: 'e2e-fix', color: 'e11d48', description: 'E2E test failure — auto-fix eligible' },
            { name: 'claude-auto', color: '6366f1', description: 'Auto-fix by JEPO Claude agent' },
          ]) {
            await github.rest.issues.getLabel({
              owner: context.repo.owner, repo: context.repo.repo, name: label.name
            }).catch(() => github.rest.issues.createLabel({
              owner: context.repo.owner, repo: context.repo.repo, ...label
            }).catch(() => {}));
          }

          const existing = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'e2e-fix', state: 'open',
          });
          const matchingIssue = existing.data.find(i =>
            i.title.includes(`PR #${prNumber}`) || i.body?.includes(`Branch: \`${branch}\``)
          );

          const bold = (s) => `**${s}**`;
          const issueBody = [
            '## E2E Test Failure (Self-hosted Mac Mini)',
            '',
            `${bold('PR:')} #${prNumber} — ${prTitle}`,
            `${bold('Branch:')} \`${branch}\``,
            `${bold('Run:')} ${runUrl}`,
            `${bold('Runner:')} self-hosted macOS arm64 — 로컬과 동일 환경, 재현 가능`,
            '',
            '## Failing Tests',
            '```',
            failingTests,
            '```',
            '',
            '## 재현 방법',
            '```bash',
            `cd ~/pruviq && git fetch origin && git checkout ${branch}`,
            'npm ci && npm run build',
            'npx playwright test tests/e2e/ --timeout 60000 --workers 2',
            '```',
            '',
            '*JEPO e2e-autofix agent가 20분 이내 재현 → 수정 → 검증 → PR 생성합니다.*',
          ].join('\n');

          if (matchingIssue) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: matchingIssue.number,
              body: `[E2E-AUTOFIX] New failure.\nRun: ${runUrl}\n\`\`\`\n${failingTests}\n\`\`\``,
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: matchingIssue.number, name: 'in-progress',
            }).catch(() => {});
          } else {
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[e2e-fix] E2E failed on PR #${prNumber} (${branch})`,
              body: issueBody,
              labels: ['e2e-fix', 'claude-auto'],
            });
            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner, repo: context.repo.repo,
            issue_number: prNumber,
            body: `[E2E-AUTOFIX] Tests failed. JEPO agent가 20분 이내 재현·수정 예정.\n\nRun: ${runUrl}`,
          });

    - name: Notify failure via Telegram
      if: failure() && github.event_name == 'pull_request'
      env:
        TOKEN: ${{ secrets.PRUVIQ_TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.PRUVIQ_TELEGRAM_CHAT_ID }}
        PR_NUM: ${{ github.event.pull_request.number }}
        BRANCH: ${{ github.event.pull_request.head.ref }}
        RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
        MSG="E2E FAIL (self-hosted): PR #${PR_NUM} (${BRANCH})
        Log: ${RUN_URL}
        JEPO autofix 20분 이내 수정 예정"
        curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" -d text="${MSG}" || true
